name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64, arm]
        exclude:
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: arm
          - goos: darwin
            goarch: arm

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - run: go mod download

      - id: vars
        run: |
          name="qrencode-go-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            name="${name}.exe"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          if [ "${GOARCH}" = "arm" ]; then
            export GOARM=7
          fi

          go build -trimpath -ldflags="-s -w" -o "${{ steps.vars.outputs.name }}" .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.name }}
          path: ${{ steps.vars.outputs.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: qrencode-go-*
          merge-multiple: true

      - run: |
          chmod +x qrencode-go-* || true
          ls -lah

      - uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true

      - run: |
          upx --best --lzma qrencode-go-linux-amd64
          upx --best --lzma qrencode-go-linux-arm64
          upx --best --lzma qrencode-go-linux-arm
          upx --best --lzma qrencode-go-windows-amd64.exe

      - run: ls -lah

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              qrencode-go-linux-amd64 \
              qrencode-go-linux-arm64 \
              qrencode-go-linux-arm \
              qrencode-go-darwin-amd64 \
              qrencode-go-darwin-arm64 \
              qrencode-go-windows-amd64.exe \
              --repo "$REPO" \
              --clobber
          else
            gh release create "$TAG" \
              qrencode-go-linux-amd64 \
              qrencode-go-linux-arm64 \
              qrencode-go-linux-arm \
              qrencode-go-darwin-amd64 \
              qrencode-go-darwin-arm64 \
              qrencode-go-windows-amd64.exe \
              --repo "$REPO" \
              --generate-notes
          fi